<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyve – Offline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #030712;
    color: #f1f5f9;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  .brand {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 0.95rem;
    margin-bottom: 2rem;
  }

  .wordmark {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: -0.07em;
    line-height: 0.92;
    color: #f8fafc;
  }

  .wordmark .accent {
    background: linear-gradient(135deg, #95a5ff, #7287ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    color: transparent;
  }

  .brand-mark {
    width: 72px;
    height: 72px;
    stroke: #95a5ff;
    stroke-width: 7;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    filter: drop-shadow(0 0 14px rgba(114, 135, 255, 0.18));
  }

  .icon {
    width: 64px;
    height: 64px;
    margin-bottom: 1.5rem;
    color: #64748b;
  }

  .message {
    font-size: 1.15rem;
    color: #94a3b8;
    margin-bottom: 2rem;
    max-width: 320px;
    line-height: 1.5;
  }

  .retry-btn {
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    color: #030712;
    background: #38bdf8;
    border: none;
    border-radius: 12px;
    padding: 0.75rem 2rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .retry-btn:hover  { background: #7dd3fc; }
  .retry-btn:active { transform: scale(0.97); }
</style>
</head>
<body>

  <div class="brand" aria-label="Hyve">
    <div class="wordmark">Hy<span class="accent">ve</span></div>
    <svg class="brand-mark" viewBox="0 0 120 120" aria-hidden="true">
      <path d="M60 9L104 34V86L60 111L16 86V34L60 9Z" />
      <path d="M60 27L88 43V77L60 93L32 77V43L60 27Z" />
    </svg>
  </div>

  <!-- wifi-off icon -->
  <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
       stroke-width="1.5" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round"
          d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
    <line x1="3" y1="3" x2="21" y2="21" stroke-linecap="round" />
  </svg>

  <p class="message">Nu există conexiune la internet.<br>Verifică rețeaua și încearcă din nou.</p>

  <button class="retry-btn" onclick="location.reload()">Încearcă din nou</button>

</body>
</html>
