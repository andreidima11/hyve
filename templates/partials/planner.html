                                        </select>

                                </div>

                                            </div>
                                        </div>

                                        </div>
                                    </div>
                                    <div class="p-add-section-body p-add-section-body--single" style="margin-top:0.5rem;">

                                                <option value="1">1 min</option>
                                                <option value="5">5 min</option>
                                                <option value="10">10 min</option>
                                                <option value="15">15 min</option>
                                                <option value="30">30 min</option>
                                                <option value="60" data-i18n="planner.hour_before">1 hour before</option>
                                                <option value="120" data-i18n="planner.hours_before">2 hours before</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                            <button type="button" class="p-add-submit" data-planner-action="createEntry" data-i18n="planner.create">Create</button>
                        </div>
                    </div>

                </div>
