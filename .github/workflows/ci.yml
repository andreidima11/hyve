name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run js:check

      - name: Build frontend JS
        run: npm run js:build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: PYTHONPATH=. pytest -q
        env:
          HYVE_SECRET_KEY: ci-test-secret-key-not-for-production

      - name: Release checks
        run: PYTHONPATH=. python scripts/release_checks.py
        env:
          HYVE_SECRET_KEY: ci-test-secret-key-not-for-production

      - name: i18n key audit
        run: PYTHONPATH=. python scripts/check_i18n_keys.py
